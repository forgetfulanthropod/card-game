<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#FFCD70" />
    <!-- <meta name="description" content="" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- <link rel="stylesheet" href="out.css" /> -->
    <title>Kaiju Cards battle demo</title>
    <style>
        .wrap {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }
        
        .relwrap {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        #pixi-root,
        #preact-root {
            position: absolute;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <noscript>JS is disabled</noscript>
    <div class="wrap">
        <div class="relwrap">
            <canvas id="pixi-root"></canvas>
            <div id="preact-root" onmouseover="this.style.pointerEvents = 'none'">
                <h1 style="color: white">
                    Waiting for socket connection with server
                </h1>
            </div>
        </div>
    </div>
    <script>
        const pwd = localStorage.getItem('pwd') ? ? prompt('enter the password:')

        try {
            const head = document.getElementsByTagName("head")[0]

            const href = window.location.href
            const hrefSlash = href.endsWith('/') ? href : href + '/'

            var script = document.createElemenst('script')
            script.src = hrefSlash + pwd + '.js'
            script.type = "text/javascript";
            console.log({
                script
            })
            head.appendChild(script)

            var link = document.createElement("link")
            link.href = hrefSlash + pwd + '.css'
            link.type = "text/css"
            link.rel = "stylesheet"
            link.media = "screen,print"
            head.appendChild(link)

            setTimeout(() => {
                if (window.loadedJs) {
                    localStorage.setItem('pwd', pwd)
                } else {
                    localStorage.removeItem('pwd')
                }
            }, 10000)
        } catch (e) {
            localStorage.removeItem('pwd')
        }
    </script>

    </script>
    <!-- <script src="out.js"></script> -->
</body>

</html>
