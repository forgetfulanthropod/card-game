<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#FFCD70" />
    <!-- <meta name="description" content="" /> -->
    <link rel="stylesheet" href="/out.css">
    <title>Kaiju Cards battle demo</title>
    <style>
        .wrap {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }
        
        .relwrap {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        #pixi-root,
        #preact-root {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        #preact-root {
            pointer-events: none;
        }
    </style>
</head>

<body>
    <noscript>JS is disabled</noscript>
    <div class="wrap">
        <div class="relwrap">
            <canvas id="pixi-root"></canvas>
            <div id="preact-root"></div>
        </div>
    </div>
    <script src="/out.js"></script>
</body>

</html>
