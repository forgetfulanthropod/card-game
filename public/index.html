    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="manifest" href="./site.webmanifest">
    <meta name="msapplication-TileColor" content="#0e3f80" />
    <meta name="theme-color" content="#0e3f80" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- <meta name="description" content="" /> -->

    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="dailyship.css" />
    <style>
        .wrap {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .relwrap {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #pixi-root,
        #react-root {
            position: absolute;
            width: 100%;
            height: 100%;
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script>
        const isLocal = document.location.hostname === 'localhost'
        const isStage = document.location.hostname.includes('test')
        const isProd = document.location.hostname.includes('play')
        const GTAG_ID =
            isLocal ? 'G-K4EZ7S800L' :
            isStage ? 'G-N5VM62XZG6' :
            isProd ? 'G-ZJEB0NYGHB' : '';

        const GTAG_URL = `https://www.googletagmanager.com/gtag/js?id=${GTAG_ID}`
        const gaSrcScript = document.createElement('script')
        gaSrcScript.setAttribute('src', GTAG_URL)
        gaSrcScript.setAttribute('async', true)
        document.head.appendChild(gaSrcScript)

        const gaConfigScript = document.createElement('script')
        gaConfigScript.text = `
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);};
            gtag('js', new Date());
            gtag('config', GTAG_ID, { 'debug_mode': isLocal || isStage });
            console.log({GTAG_ID, isLocal})
        `
        document.head.appendChild(gaConfigScript)
    </script>
</head>

<body>
    <noscript>JS is disabled</noscript>
    <div class="wrap">
        <div class="relwrap">
            <img src="loading.gif" style="position: absolute; right: 0; bottom: 0;"/>
            <canvas id="pixi-root"></canvas>
            <div id="react-root" onmouseover="this.style.pointerEvents = 'none'"></div>
        </div>
    </div>
    <script src="dailyship.js"></script>

    <!-- <script src="out.js"></script> -->
</body>

</html>
