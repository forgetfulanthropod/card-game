    />

    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">

    <!-- <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes"> -->
    <!-- <meta name="description" content="" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jockey+One&display=swap" rel="stylesheet">

    <!-- <link rel="stylesheet" href="out.css" /> -->
    <style>
        .wrap {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .relwrap {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #pixi-root,
        #preact-root {
            position: absolute;
            width: 100%;
            height: 100%;
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script>
        const isLocal = document.location.hostname === 'localhost'
        const isStage = document.location.hostname.includes('test')
        const isProd = document.location.hostname.includes('play')
        const GTAG_ID =
            isLocal ? 'G-K4EZ7S800L' :
            isStage ? 'G-N5VM62XZG6' :
            isProd ? 'G-ZJEB0NYGHB' : '';

        const GTAG_URL = `https://www.googletagmanager.com/gtag/js?id=${GTAG_ID}`
        const gaSrcScript = document.createElement('script')
        gaSrcScript.setAttribute('src', GTAG_URL)
        gaSrcScript.setAttribute('async', true)
        document.head.appendChild(gaSrcScript)

        const gaConfigScript = document.createElement('script')
        gaConfigScript.text = `
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);};
            gtag('js', new Date());
            gtag('config', GTAG_ID, { 'debug_mode': isLocal || isStage });
            console.log({GTAG_ID, isLocal})
        `
        document.head.appendChild(gaConfigScript)
    </script>
</head>

<body>
    <noscript>JS is disabled</noscript>
    <div class="wrap">
        <div class="relwrap">
            <canvas id="pixi-root"></canvas>
            <div id="preact-root" onmouseover="this.style.pointerEvents = 'none'">
                <h1 style="color: white">
                    Waiting for socket connection with server
                </h1>
            </div>
        </div>
    </div>
    <script>
        (async () => {
            const pwd = localStorage.getItem('pwd') ?? prompt('enter the password:')
            // const pwd = 'dailyship'
            await new Promise(resolve => setTimeout(resolve, 100))

            try {
                const head = document.getElementsByTagName("head")[0]

                const href = window.location.href
                const hrefSlash = href.endsWith('/') ? href : href + '/'

                var script = document.createElement('script')
                script.src = hrefSlash + pwd + '.js'
                script.type = "text/javascript"

                const fileExists = await fetch( script.src).then(response => response.status === 200)
                if (! fileExists) throw new Error('bad password')

                head.appendChild(script)

                var link = document.createElement("link")
                link.href = hrefSlash + pwd + '.css'
                link.type = "text/css"
                link.rel = "stylesheet"
                link.media = "screen,print"
                head.appendChild(link)

                setTimeout(() => {
                    if (window.loadedJs) {
                        localStorage.setItem('pwd', pwd)
                    } else {
                        localStorage.removeItem('pwd')
                    }
                }, 10_000)
            } catch (e) {
                console.error(e)
                localStorage.removeItem('pwd')
            }
        })()
    </script>

    <!-- <script src="out.js"></script> -->
</body>

</html>
